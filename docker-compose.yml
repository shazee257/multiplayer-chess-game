services:
  postgres:
    image: postgres:16-alpine
    container_name: chess_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: chess
      POSTGRES_PASSWORD: chess
      POSTGRES_DB: chess_game
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chess -d chess_game"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
